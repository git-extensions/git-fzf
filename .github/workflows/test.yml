name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Run shellcheck
        run: nix develop --command bash -c 'shellcheck -x --source-path=SCRIPTDIR git-fzf scripts/*.sh'

      - name: Run bats tests
        run: nix develop --command bash -c 'bats tests/'
